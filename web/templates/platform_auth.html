{% extends "base.html" %}

{% block title %}登录管理 · Trawler{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold tracking-tight mb-1">登录管理</h1>
<p class="text-sm text-[var(--text-secondary)] mb-6">各平台 Token 状态 · 扫码登录续期</p>

<!-- Token status cards grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  {% for p in platforms %}
  {% include "_auth_card.html" %}
  {% endfor %}
</div>

<!-- QR Modal (hidden by default) -->
<div id="qr-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center" onclick="if(event.target===this)closeQRModal()">
  <div class="bg-white dark:bg-gray-800 rounded-[14px] p-6 shadow-2xl max-w-sm w-full mx-4" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold text-[var(--text-primary)]" id="qr-title">扫码登录</h3>
      <button onclick="closeQRModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl leading-none">&times;</button>
    </div>
    <!-- 4-step progress -->
    <div class="flex items-center gap-1 mb-2">
      <div id="step-1" class="flex-1 h-1 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors"></div>
      <div id="step-2" class="flex-1 h-1 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors"></div>
      <div id="step-3" class="flex-1 h-1 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors"></div>
      <div id="step-4" class="flex-1 h-1 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors"></div>
    </div>
    <div class="flex justify-between text-xs text-[var(--text-secondary)] mb-6">
      <span id="step-label-1" class="flex-1">二维码生成</span>
      <span id="step-label-2" class="flex-1 text-center">等待扫描</span>
      <span id="step-label-3" class="flex-1 text-center">确认登录</span>
      <span id="step-label-4" class="text-right">保存凭证</span>
    </div>
    <!-- QR image -->
    <div class="flex justify-center mb-4">
      <img id="qr-img" src="" alt="QR Code" class="w-48 h-48 rounded-[8px] border border-gray-200 dark:border-gray-700">
    </div>
    <div id="qr-status" class="text-center text-sm text-[var(--text-secondary)] mb-2">正在生成二维码…</div>
    <div id="qr-countdown" class="text-center text-xs text-orange-500"></div>
  </div>
</div>

<script>
  // ── Nickname 异步填充（骨架渲染后并发拉取）──────────────────
  // /auth 返回的骨架中 nickname 恒为空，slot 显示「加载中…」。
  // DOM ready 后单次批量请求 /auth/nicknames（后端并行拉取 3 平台），
  // 拿到结果后遍历 .nickname-slot 填充。
  //
  // ⚠️ slot 渲染规则（_auth_card.html）：模板内用 p.nickname or '加载中…'
  //   - 整页 /auth（骨架）：p.nickname=None → 显示「加载中…」→ 下面 fetch 填充
  //   - partial refresh /auth/card/{p}：p.nickname=<真实> → 直接显示真实 nickname
  //     此时 slot.textContent 已是真实值，fillNicknameSlots() 不会覆盖
  //     （仅当 slot 仍为「加载中…」占位时才填，避免破坏 partial refresh 路径）
  function fillNicknameSlots() {
    var slots = document.querySelectorAll('.nickname-slot');
    if (slots.length === 0) return;  // 无登录平台，无需请求

    // 只处理仍是占位「加载中…」的 slot（partial refresh 已填好的跳过）
    var pending = [];
    slots.forEach(function(slot) {
      if (slot.textContent.trim() === '加载中…') pending.push(slot);
    });
    if (pending.length === 0) return;

    fetch('/auth/nicknames', { headers: { 'Accept': 'application/json' } })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        pending.forEach(function(slot) {
          var platform = slot.getAttribute('data-platform');
          var nick = data[platform];
          slot.textContent = nick || '—';
        });
      })
      .catch(function(err) {
        // 整体失败（网络错误）—— 降级显示「—」，不弹 toast（nickname 是装饰信息）
        console.warn('nickname fetch failed', err);
        pending.forEach(function(slot) { slot.textContent = '—'; });
      });
  }

  // 整页 /auth 首次加载：DOM ready 后填充骨架 slot
  fillNicknameSlots();

  // Override base.html placeholders with real implementation
  var qrPollInterval = null;
  var qrCountdownInterval = null;
  var qrPlatform = null;
  var qrTriggerBtn = null;     // the button that opened the modal
  var qrOutcome = null;        // 'success' | 'failed' | null — set before closeQRModal

  // ── Renew button loading state ──────────────────────────────
  function setRenewLoading(btn, loading) {
    if (!btn) return;
    if (loading) {
      if (btn.dataset.origText === undefined) btn.dataset.origText = btn.textContent.trim();
      btn.disabled = true;
      btn.innerHTML =
        '<svg class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">'
        + '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>'
        + '<path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>'
        + '</svg>'
        + '<span>' + btn.dataset.origText + '…</span>';
    } else if (btn.dataset.origText !== undefined) {
      btn.disabled = false;
      btn.textContent = btn.dataset.origText;
      delete btn.dataset.origText;
    }
  }

  function setStep(n, state) {
    // state: 'pending' (gray), 'current' (blue), 'done' (green)
    var color = state === 'done' ? 'bg-green-500'
              : state === 'current' ? 'bg-blue-500'
              : 'bg-gray-200 dark:bg-gray-700';
    var labelColor = state === 'done' ? 'text-green-500 font-medium'
                   : state === 'current' ? 'text-blue-500 font-medium'
                   : 'text-[var(--text-secondary)]';
    var seg = document.getElementById('step-' + n);
    if (seg) seg.className = 'flex-1 h-1 rounded-full transition-colors ' + color;
    var lbl = document.getElementById('step-label-' + n);
    if (lbl) lbl.className = lbl.className.replace(/text-(green|blue|orange)-500[^'"]*/g, '').replace(/font-medium/g, '').trim() + ' ' + labelColor;
  }

  function openQRModal(platform, btn) {
    qrPlatform = platform;
    qrTriggerBtn = btn || null;
    qrOutcome = null;

    // Button loading state until QR image is ready (or fails)
    setRenewLoading(qrTriggerBtn, true);

    var overlay = document.getElementById('qr-overlay');
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');

    // Reset all steps to pending
    for (var i = 1; i <= 4; i++) {
      var seg = document.getElementById('step-' + i);
      seg.className = 'flex-1 h-1 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors';
      var lbl = document.getElementById('step-label-' + i);
      lbl.className = lbl.className.replace(/text-(green|blue|orange)-500[^'"]*/g, '').replace(/font-medium/g, '').trim();
      lbl.classList.add('text-[var(--text-secondary)]');
      if (i === 4) lbl.classList.add('text-right');
      else if (i > 1) lbl.classList.add('text-center');
    }
    // Step 1 = current (blue) immediately
    setStep(1, 'current');

    document.getElementById('qr-status').textContent = '正在生成二维码…';
    document.getElementById('qr-countdown').textContent = '';
    document.getElementById('qr-countdown').className = 'text-center text-xs text-orange-500';

    // Load QR image (this triggers server to start the QR session)
    var img = document.getElementById('qr-img');
    img.src = '/auth/qr/' + platform + '?t=' + Date.now();
    img.onload = function() {
      // QR loaded → button stops loading, step 1 done, step 2 current
      setRenewLoading(qrTriggerBtn, false);
      setStep(1, 'done');
      setStep(2, 'current');
      document.getElementById('qr-status').textContent = '等待扫码…';
      // Start countdown (QR ~120s lifetime)
      var countdown = 120;
      document.getElementById('qr-countdown').textContent = '⏱ ' + countdown + 's';
      if (qrCountdownInterval) clearInterval(qrCountdownInterval);
      qrCountdownInterval = setInterval(function() {
        countdown--;
        document.getElementById('qr-countdown').textContent = '⏱ ' + countdown + 's';
        if (countdown <= 10) {
          document.getElementById('qr-countdown').className = 'text-center text-xs text-red-500';
        }
        if (countdown <= 0) {
          clearInterval(qrCountdownInterval);
          qrCountdownInterval = null;
          document.getElementById('qr-status').textContent = '二维码已过期，请关闭后重试';
          document.getElementById('qr-countdown').textContent = '';
          if (qrPollInterval) { clearInterval(qrPollInterval); qrPollInterval = null; }
        }
      }, 1000);
    };
    img.onerror = function() {
      // QR failed — stop button loading, mark as failed for toast
      setRenewLoading(qrTriggerBtn, false);
      qrOutcome = 'failed';
      document.getElementById('qr-status').textContent = '二维码生成失败，请重试';
      showToast('二维码生成失败', 'error');
    };

    // Start polling
    if (qrPollInterval) clearInterval(qrPollInterval);
    qrPollInterval = setInterval(function() {
      fetch('/auth/poll/' + platform)
        .then(function(r) { return r.json(); })
        .then(function(data) { handlePollStatus(data); })
        .catch(function(err) {
          // Network error — keep polling, just log
          console.warn('poll error', err);
        });
    }, 2000);
  }

  function handlePollStatus(data) {
    var status = data.status;
    if (status === 'waiting') {
      // Still waiting — no change
      return;
    }
    if (status === 'captcha') {
      var qrUrl = data.qr_url;
      if (qrUrl && qrUrl !== '') {
        document.getElementById('qr-status').textContent = '需要二次验证，请用小红书APP扫描下方二维码';
        document.getElementById('qr-img').src = '/auth/captcha_qr/' + qrPlatform + '?t=' + Date.now();
        setStep(2, 'done');
        setStep(3, 'current');
      } else {
        document.getElementById('qr-status').textContent = '等待二次验证扫码…';
      }
      return;
    }
    if (status === 'scanned') {
      document.getElementById('qr-status').textContent = '已扫码，请在手机上确认';
      setStep(2, 'done');
      setStep(3, 'current');
      return;
    }
    if (status === 'confirmed') {
      document.getElementById('qr-status').textContent = '已确认，正在保存凭证…';
      setStep(2, 'done');
      setStep(3, 'done');
      setStep(4, 'current');
      return;
    }
    if (status === 'success') {
      if (qrPollInterval) { clearInterval(qrPollInterval); qrPollInterval = null; }
      if (qrCountdownInterval) { clearInterval(qrCountdownInterval); qrCountdownInterval = null; }
      document.getElementById('qr-status').textContent = '✅ 登录成功';
      setStep(3, 'done');
      setStep(4, 'done');
      qrOutcome = 'success';
      setRenewLoading(qrTriggerBtn, false);  // safety: ensure not stuck
      var platform = qrPlatform;
      setTimeout(function() {
        closeQRModal();
        showToast('登录成功', 'success');
        // Partial refresh of this platform's card — avoids full page reload
        refreshAuthCard(platform);
      }, 1200);
      return;
    }
    // expired / error / no_session
    if (qrPollInterval) { clearInterval(qrPollInterval); qrPollInterval = null; }
    if (qrCountdownInterval) { clearInterval(qrCountdownInterval); qrCountdownInterval = null; }
    qrOutcome = 'failed';
    setRenewLoading(qrTriggerBtn, false);  // safety: ensure not stuck
    var msg = data.message || '二维码已过期，请重试';
    document.getElementById('qr-status').textContent = msg;
    document.getElementById('qr-countdown').textContent = '';
    showToast(msg, 'error');
  }

  function closeQRModal() {
    // 仅在非 success 关闭时提示（success 时 handlePollStatus 已显示成功 toast）
    var statusEl = document.getElementById('qr-status');
    var wasSuccess = statusEl && statusEl.textContent.indexOf('成功') !== -1;
    if (!wasSuccess && qrOutcome !== 'success') {
      // 用户主动关闭且尚未成功 → 警告（QR 加载失败时已弹过 error toast，这里跳过避免重复）
      if (qrOutcome !== 'failed') {
        showToast('登录未完成', 'warning');
      }
    }
    // Always clean up button loading state — avoid stuck spinner
    setRenewLoading(qrTriggerBtn, false);
    var overlay = document.getElementById('qr-overlay');
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    if (qrPollInterval) { clearInterval(qrPollInterval); qrPollInterval = null; }
    if (qrCountdownInterval) { clearInterval(qrCountdownInterval); qrCountdownInterval = null; }
    qrPlatform = null;
    qrTriggerBtn = null;
    qrOutcome = null;
  }

  // ── Renew (token refresh) — distinct from QR re-login ──────────
  function renewToken(platform, btn) {
    if (!platform) return;
    // 防御性双击：按钮 disabled 后键盘/快捷键仍可能触发 onclick。
    // 与 setRenewLoading(btn, true) 配合，确保一次续期只发一个请求。
    if (btn && btn.disabled) return;
    setRenewLoading(btn, true);
    fetch('/auth/refresh/' + platform, { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setRenewLoading(btn, false);
        if (d.ok) {
          showToast(d.message || '续期成功', 'success');
          refreshAuthCard(platform);
        } else {
          showToast(d.message || '续期失败', 'warning');
        }
      })
      .catch(function(err) {
        setRenewLoading(btn, false);
        showToast('续期失败: ' + err.message, 'error');
      });
  }

  // ── Partial refresh: replace a single auth card via HTMX-style fetch ──
  function refreshAuthCard(platform) {
    if (!platform) return;
    fetch('/auth/card/' + platform, { headers: { 'Accept': 'text/html' } })
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var old = document.getElementById('auth-card-' + platform);
        if (!old) {
          // Card vanished from DOM — fall back to full reload
          location.reload();
          return;
        }
        var tmp = document.createElement('div');
        tmp.innerHTML = html.trim();
        var fresh = tmp.firstElementChild;
        if (!fresh) return;
        old.replaceWith(fresh);
        // Subtle flash to signal refresh
        fresh.style.transition = 'background-color 0.4s ease';
        fresh.style.backgroundColor = 'rgba(52, 199, 89, 0.10)';
        setTimeout(function() { fresh.style.backgroundColor = ''; }, 600);
      })
      .catch(function() {
        // Network failure — fall back to full reload so user sees fresh state
        location.reload();
      });
  }

  // ── Logout button ────────────────────────────────────────────
  function setLogoutLoading(btn, loading) {
    if (!btn) return;
    if (loading) {
      if (btn.dataset.origText === undefined) btn.dataset.origText = btn.textContent.trim();
      btn.disabled = true;
      btn.innerHTML =
        '<svg class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">'
        + '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>'
        + '<path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>'
        + '</svg>'
        + '<span>' + btn.dataset.origText + '…</span>';
    } else if (btn.dataset.origText !== undefined) {
      btn.disabled = false;
      btn.textContent = btn.dataset.origText;
      delete btn.dataset.origText;
    }
  }

  function logoutPlatform(platform, btn) {
    if (!platform) return;
    if (!window.confirm('确定要注销该平台的登录凭证吗？')) return;
    setLogoutLoading(btn, true);
    fetch('/auth/logout/' + platform, { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        setLogoutLoading(btn, false);
        if (data.ok) {
          showToast(data.message || '已注销', 'success');
          refreshAuthCard(platform);
        } else {
          showToast(data.message || '注销失败', 'warning');
        }
      })
      .catch(function(err) {
        setLogoutLoading(btn, false);
        showToast('注销失败: 网络错误', 'error');
      });
  }
</script>
{% endblock %}
