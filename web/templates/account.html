{% extends "base.html" %}
{% block title %}账户 · Trawler{% endblock %}

{% block content %}
<div class="max-w-lg">
  <h1 class="text-2xl font-semibold tracking-tight mb-1">账户</h1>
  <p class="text-sm text-[var(--text-secondary)] mb-6">修改管理员密码后，所有已登录会话将立即失效。</p>
  {% if errors %}
  <div class="mb-4 rounded-[10px] bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-500">
    <ul class="list-disc list-inside space-y-1">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  <div class="bg-[var(--card-bg)] backdrop-blur-[20px] rounded-[14px] shadow-card border border-[var(--card-border)] p-6">
    <form hx-post="/settings/account"
          hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
          hx-disabled-elt="button[type=submit]"
          accept-charset="UTF-8"
          class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">当前密码</label>
        <input type="password" name="current_password" required
               class="w-full px-3 py-2 rounded-[8px] bg-[var(--bg-base)] border border-[var(--card-border)] focus:border-apple-blue focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">新密码</label>
        <input type="password" name="new_password" required minlength="8"
               class="w-full px-3 py-2 rounded-[8px] bg-[var(--bg-base)] border border-[var(--card-border)] focus:border-apple-blue focus:outline-none transition-colors"
               placeholder="至少 8 个字符">
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">确认新密码</label>
        <input type="password" name="new_password_confirm" required minlength="8"
               class="w-full px-3 py-2 rounded-[8px] bg-[var(--bg-base)] border border-[var(--card-border)] focus:border-apple-blue focus:outline-none transition-colors">
      </div>
      <div class="flex justify-end">
        <button type="submit"
                class="px-4 py-2 rounded-[8px] bg-apple-blue text-white text-sm font-medium hover:bg-apple-blue-dark transition-colors">
          修改密码
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
