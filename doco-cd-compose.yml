# ─────────────────────────────────────────────────────────────────────
# Doco-CD - 服务器端 docker-compose
#
# 把这个文件放到服务器，例如 /root/doco-cd/docker-compose.yml
# 然后 docker compose up -d
#
# 它会定期轮询你的 Git 仓库，检测到变更后自动部署
# ─────────────────────────────────────────────────────────────────────

services:
  doco-cd:
    image: ghcr.io/kimdre/doco-cd:latest
    container_name: doco-cd
    restart: unless-stopped
    ports:
      # Webhook 端口（如果用轮询就不需要暴露到公网）
      - "127.0.0.1:8000:80"
      # Prometheus 指标（可选）
      - "127.0.0.1:9120:9120"
    environment:
      TZ: Asia/Shanghai
      GIT_ACCESS_TOKEN: ${GIT_ACCESS_TOKEN}  # 从 .env 文件读，避免硬编码
      POLL_CONFIG: |
        - url: https://github.com/YinY1/trawler.git
          reference: master
          interval: 600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - doco-cd-data:/data
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/doco-cd", "healthcheck"]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  doco-cd-data:
