# Trawler logrotate 配置
# 安装: sudo cp logrotate.conf /etc/logrotate.d/trawler
# 测试: sudo logrotate -d /etc/logrotate.d/trawler
#
# 注意: 应用日志 (data/trawler.log) 已通过 RotatingFileHandler 自动轮转，
# 本配置用于 cron shell 重定向日志 (cron.log)

/path/to/trawler/cron.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
}