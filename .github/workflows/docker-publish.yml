# ─────────────────────────────────────────────────────────────────────
# 构建 Docker 镜像并推送到 GHCR
# 触发：打 vX.Y.Z tag 时构建（issue #93：移除 push:master 触发，避免
#       每次合 PR 都刷 latest；latest 现在跟随发版 tag，watchtower 只在
#       发版后才会拉到新镜像）+ workflow_dispatch 手动兜底
# ─────────────────────────────────────────────────────────────────────

name: Build & Push to GHCR

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest 跟随发版 tag（issue #93 review：原 enable={{is_default_branch}}
            # 在 tag 触发时返回 false，导致 latest 不打、watchtower 失效）
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      # issue #98：github.run_started_at 不是官方 github context 属性，在 workflow
      # 引擎预处理阶段可能为空（实证：v1.0.0 发版 BUILD_DATE 注入失败）。
      # 改用 date -u 显式生成 UTC ISO 8601 时间戳，100% 可预测。
      - name: Get build timestamp
        id: timestamp
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # tag 触发：github.ref_name = "v1.0.0"（带 v 前缀，作为版本语义标记原样注入）
          # workflow_dispatch 手动触发：ref_name 为分支名 → 传空字符串，容器走 dist metadata fallback
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.timestamp.outputs.build_date }}
            TRAWLER_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
