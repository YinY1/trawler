# ─────────────────────────────────────────────────────────────────────
# 构建 Docker 镜像并推送到 GHCR
# 触发：打 vX.Y.Z tag 时构建（issue #93：移除 push:master 触发，避免
#       每次合 PR 都刷 latest；latest 现在跟随发版 tag，watchtower 只在
#       发版后才会拉到新镜像）+ workflow_dispatch 手动兜底
# ─────────────────────────────────────────────────────────────────────

name: Build & Push to GHCR

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # tag 触发：github.ref_name = "v0.2.0"（带 v 前缀，作为版本语义标记原样注入）
          # workflow_dispatch 手动触发：ref_name 为分支名 → 传空字符串，容器走 dist metadata fallback
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.run_started_at }}
            TRAWLER_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
